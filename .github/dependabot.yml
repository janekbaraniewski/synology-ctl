version: 2
updates:
  # ── Go modules ─────────────────────────────────────────────────────
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - go
    commit-message:
      prefix: "deps"
      include: scope
    groups:
      go-minor-and-patch:
        update-types:
          - minor
          - patch

  # ── GitHub Actions ─────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "ci(actions)"
    groups:
      actions-minor-and-patch:
        update-types:
          - minor
          - patch
