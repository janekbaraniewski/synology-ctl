name: CI

on:
  pull_request:
    branches: [master, main]
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Run tests
        run: go test ./...

  verify:
    name: Verify
    runs-on: ubuntu-latest
    env:
      REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: make fmt-check

      - name: Vet
        run: make vet

      - name: Race tests
        run: go test -race ./...

      - name: Lint GitHub Actions workflows
        run: make workflow-lint

      - name: Cross-platform builds
        run: make build-all

      - name: Validate release config
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: v2.15.2
          args: check

      - name: Snapshot release build
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: v2.15.2
          # --skip=sign because cosign isn't installed in the verify
          # job — the real release.yml installs it and the build path
          # is the same up to that point.
          args: release --snapshot --clean --skip=publish --skip=sign

      - name: Generate Homebrew formula (dry run)
        run: |
          VERSION=$(sed -n 's/.*"version":"\([^"]*\)".*/\1/p' dist/metadata.json)
          test -n "${VERSION}"
          SHA_DARWIN_AMD64=$(sha256sum "dist/synoctl_${VERSION}_darwin_amd64.tar.gz" | awk '{print $1}')
          SHA_DARWIN_ARM64=$(sha256sum "dist/synoctl_${VERSION}_darwin_arm64.tar.gz" | awk '{print $1}')
          SHA_LINUX_AMD64=$(sha256sum "dist/synoctl_${VERSION}_linux_amd64.tar.gz" | awk '{print $1}')
          SHA_LINUX_ARM64=$(sha256sum "dist/synoctl_${VERSION}_linux_arm64.tar.gz" | awk '{print $1}')

          scripts/generate_homebrew_formula.sh \
            --formula-name synoctl \
            --formula-class Synoctl \
            --binary synoctl \
            --desc "A TUI-first management tool for Synology DSM" \
            --homepage "https://github.com/${REPO}" \
            --version "${VERSION}" \
            --repo "${REPO}" \
            --license "MIT" \
            --sha-darwin-amd64 "${SHA_DARWIN_AMD64}" \
            --sha-darwin-arm64 "${SHA_DARWIN_ARM64}" \
            --sha-linux-amd64 "${SHA_LINUX_AMD64}" \
            --sha-linux-arm64 "${SHA_LINUX_ARM64}" \
            --output dist/synoctl.rb

      - name: Validate Homebrew formula syntax
        run: ruby -c dist/synoctl.rb
