name: release-please

# release-please watches main for conventional commits, opens (and
# refreshes) a "release PR" that bumps the version + regenerates
# CHANGELOG.md. Merging that PR tags the commit and creates a GitHub
# Release — which in turn triggers .github/workflows/release.yml to
# attach signed binaries.
#
# Result: the only manual step in the cut-a-release flow is reviewing
# the auto-generated release PR.
#
# After release-please runs, refresh-release-prs nudges the open
# release PR's head branch so it stays current with main and the
# "branch is up to date" status check stays green without manual
# clicks.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Require release automation token
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.AUTOMATION_TOKEN }}
        run: |
          test -n "$RELEASE_TOKEN" || {
            echo "::error::Configure RELEASE_PLEASE_TOKEN or AUTOMATION_TOKEN; GITHUB_TOKEN is intentionally read-only."
            exit 1
          }

      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.AUTOMATION_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  refresh-release-prs:
    needs: release-please
    name: Update open release PR branches
    uses: ./.github/workflows/refresh-pr-branches.yaml
    permissions:
      contents: read
      issues: read
      pull-requests: write
    with:
      labels: "autorelease: pending"
    secrets:
      branch_refresh_token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.AUTOMATION_TOKEN }}
