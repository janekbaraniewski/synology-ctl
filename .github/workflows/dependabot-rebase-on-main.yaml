name: Dependabot rebase open PRs on main update

# When main moves forward, ask Dependabot to refresh its open PRs
# against the new tip. Mirrors the equivalent workflow in openusage:
# delegates the actual work to refresh-dependabot-prs.yaml so the
# script lives in one place.

on:
  push:
    branches: [main]
  workflow_dispatch:

# The reusable callee needs contents:write + pull-requests:write to
# nudge Dependabot's branches. A reusable workflow can never escalate
# beyond what its caller grants -- so the caller has to grant them too,
# otherwise GitHub rejects the run with "startup_failure" before the
# job ever spins up.
permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  refresh-dependabot-prs:
    name: Refresh open Dependabot PRs
    uses: ./.github/workflows/refresh-dependabot-prs.yaml
    secrets: inherit
    permissions:
      contents: write
      pull-requests: write
