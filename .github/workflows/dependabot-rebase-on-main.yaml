name: Dependabot rebase open PRs on main update

# When main moves forward, ask Dependabot to refresh its open PRs
# against the new tip. Mirrors the equivalent workflow in openusage:
# delegates the actual work to refresh-dependabot-prs.yaml so the
# script lives in one place.

on:
  push:
    branches: [main]
  workflow_dispatch:

# The reusable callee only needs pull-requests:write to request branch
# updates. Keep contents read-only so the default GITHUB_TOKEN cannot
# push repository contents from this workflow.
permissions:
  contents: read
  pull-requests: write

jobs:
  refresh-dependabot-prs:
    name: Refresh open Dependabot PRs
    uses: ./.github/workflows/refresh-dependabot-prs.yaml
    secrets: inherit
    permissions:
      contents: read
      pull-requests: write
