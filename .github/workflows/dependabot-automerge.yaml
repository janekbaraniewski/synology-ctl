name: Dependabot auto-merge

# Approves and enables auto-merge for Dependabot PRs. Auto-merge
# kicks in only after the normal required status checks pass.

on:
  pull_request_target:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review, labeled]

permissions:
  contents: read

jobs:
  automerge:
    name: Approve and enable auto-merge
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.AUTOMATION_TOKEN || secrets.RELEASE_PLEASE_TOKEN || github.token }}

      - name: Log update info
        env:
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
          DEP_TYPE: ${{ steps.metadata.outputs.dependency-type }}
          ECOSYSTEM: ${{ steps.metadata.outputs.package-ecosystem }}
        run: |
          echo "::notice::ecosystem=$ECOSYSTEM update_type=$UPDATE_TYPE dep_type=$DEP_TYPE"

      # Prefer the automation token so Dependabot auto-merges emit
      # normal push events and refresh the remaining queued PRs.

      - name: Approve the PR
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_TOKEN || secrets.RELEASE_PLEASE_TOKEN || github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr review --approve "$PR_URL" --body "Auto-approved by policy."

      - name: Add auto-approved label
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_TOKEN || secrets.RELEASE_PLEASE_TOKEN || github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr edit "$PR_URL" --add-label auto-approved

      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_TOKEN || secrets.RELEASE_PLEASE_TOKEN || github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr merge --auto --squash "$PR_URL"
