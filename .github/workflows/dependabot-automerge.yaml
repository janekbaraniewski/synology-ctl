name: Dependabot auto-merge

# Approves and enables auto-merge for Dependabot PRs that bump
# dependencies by a patch or minor version. Major bumps are
# explicitly skipped so a human still reviews them. Auto-merge
# kicks in only after the normal required status checks pass.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  automerge:
    name: Approve and enable auto-merge
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log update info
        env:
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
          DEP_TYPE: ${{ steps.metadata.outputs.dependency-type }}
          ECOSYSTEM: ${{ steps.metadata.outputs.package-ecosystem }}
        run: |
          echo "::notice::ecosystem=$ECOSYSTEM update_type=$UPDATE_TYPE dep_type=$DEP_TYPE"

      - name: Skip major bumps
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          echo "::notice::Major version bump detected â€” leaving PR for human review."
          gh pr comment "$PR_URL" --body "Major version bump detected; auto-merge skipped. A human review is required."
          exit 0

      - name: Approve the PR
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr review --approve "$PR_URL" --body "Auto-approved by policy (patch/minor Dependabot bump)."

      - name: Add auto-approved label
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr edit "$PR_URL" --add-label auto-approved

      - name: Enable auto-merge (squash)
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr merge --auto --squash "$PR_URL"
