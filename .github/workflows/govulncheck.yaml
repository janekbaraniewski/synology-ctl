name: govulncheck

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  govulncheck:
    name: Scan for known Go vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      # We invoke govulncheck directly instead of using
      # golang/govulncheck-action, because that action's composite
      # definition still references actions/checkout@v4.1.1 and
      # actions/setup-go@v5.0.0 by tag. The repo policy refuses to
      # start any workflow whose actions (transitive included) are
      # not pinned to a full-length commit SHA.
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...
